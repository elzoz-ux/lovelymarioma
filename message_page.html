<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Message For You</title>
    <!-- استدعاء خطوط كايرو للمسدج، وخط مشبك لكلمة Lovely -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Nunito:wght@600;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #f5ebe0 0%, #e3d5ca 100%);
            font-family: 'Arial', sans-serif; 
            margin: 0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* حاوية القلوب البني */
        #hearts-bg { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            pointer-events: none; z-index: 1; overflow: hidden; 
        }
        .brown-heart {
            position: absolute; z-index: 1; pointer-events: none; opacity: 0.75;
            animation: fallBrownHearts linear forwards;
        }
        @keyframes fallBrownHearts {
            0% { top: -10vh; transform: rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { top: 110vh; transform: rotate(360deg) translateX(50px); opacity: 0; }
        }

        /* المحتوى الأساسي */
        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
            margin-bottom: 80px; /* مسافة عشان مشغل الأغاني */
        }

        /* القلب اللامع اللي فوق البرواز */
        .top-sparkle-heart {
            font-size: 32px;
            margin-bottom: 20px;
            animation: floatHeart 3s ease-in-out infinite;
        }
        @keyframes floatHeart {
            0% { transform: translateY(0); }
            50% { transform: translateY(-8px) scale(1.05); }
            100% { transform: translateY(0); }
        }

        /* برواز الرسالة (الكارت) */
        .message-text-card {
            background: #faf4ee;
            width: 90%;
            min-height: 250px;
            border-radius: 24px;
            padding: 30px 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
            margin-bottom: 30px;
        }

        /* تنسيق الكتابة جوه البرواز */
        #typing-container {
            font-family: 'Cairo', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #4a3b34;
            line-height: 2.2;
            direction: rtl; /* الكتابة من اليمين للشمال */
            text-align: right;
        }

        .cursor {
            display: inline-block; width: 2px; height: 22px; 
            background-color: #4a3b34; margin-right: 4px; 
            animation: blink 0.7s infinite; transform: translateY(4px);
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* زرار الـ memories */
        .memories-btn {
            background: #f8dbdb; /* درجة بينك فاتحة كريمي */
            color: #3d3131;
            font-family: 'Nunito', sans-serif;
            font-size: 17px;
            font-weight: 800;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(248, 219, 219, 0.5);
            transition: 0.3s;
            margin-bottom: 25px;
            border: 2px solid #fff9f9;
        }
        .memories-btn:hover {
            transform: translateY(-2px);
            background: #f5cfcf;
        }

        /* كلمة Lovely النيون */
        .lovely-neon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }
        .lovely-text {
            font-family: 'Dancing Script', cursive;
            font-size: 38px;
            font-weight: 700;
            color: #ff7eb3;
            text-shadow: 0 0 10px rgba(255, 126, 179, 0.4), 0 0 20px rgba(255, 126, 179, 0.2);
            letter-spacing: 2px;
        }
        .lovely-heart {
            font-size: 24px;
            animation: pulseNeon 2s infinite alternate;
        }
        @keyframes pulseNeon {
            0% { transform: scale(1); opacity: 0.8; filter: drop-shadow(0 0 5px rgba(255,20,147,0.4)); }
            100% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 10px rgba(255,20,147,0.7)); }
        }

        /* --- مشغل الأغاني نفس التنسيق --- */
        .music-player { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background-color: #faf4ee; border-radius: 50px; padding: 10px 15px; box-shadow: 0 6px 20px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 12px; z-index: 100; border: 1px solid #e3d5ca; direction: ltr; box-sizing: border-box; }
        .player-thumb { width: 45px; height: 45px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
        .player-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .player-controls { display: flex; align-items: center; gap: 8px; }
        .ctrl-btn { background: none; border: none; color: #5a4a42; cursor: pointer; padding: 5px; opacity: 0.8; transition: 0.2s; }
        .play-pause-btn { background: #d5bdaf; border: none; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 50%; box-shadow: 0 2px 5px rgba(213, 189, 175, 0.4); flex-shrink: 0;}
        .track-info { display: flex; flex-direction: column; flex-grow: 1; gap: 2px; overflow: hidden; }
        .track-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .track-title { direction: rtl; display: flex; align-items: center; gap: 6px; font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 700; color: #5a4a42; white-space: nowrap; }
        .custom-emoji { font-size: 16px; }
        .page-num { font-family: 'Nunito', sans-serif; font-size: 12px; color: #a39284; font-weight: 700; }
        .progress-container { width: 100%; margin-top: 2px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 4px; background: #e3d5ca; cursor: pointer; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 0; height: 0; }
        .time-row { display: flex; justify-content: space-between; font-family: 'Nunito', sans-serif; font-size: 11px; color: #a39284; margin-top: 4px; font-weight: 700; }
    </style>
</head>
<body>

    <div id="hearts-bg"></div>

    <div class="content-wrapper">
        <!-- القلب اللامع اللي فوق الكارت -->
        <div class="top-sparkle-heart">💖</div>

        <!-- الكارت اللي بيتكتب جواه الكلام -->
        <div class="message-text-card">
            <div id="typing-container"></div>
        </div>

        <!-- زرار الذكريات للرجوع للصفحة الرئيسية -->
        <!-- لو صفحتك الرئيسية مش اسمها index.html، غير الكلمة هنا -->
        <a href="index.html" class="memories-btn">
            <span>🔄</span> memories
        </a>

        <!-- كلمة Lovely النيون -->
        <div class="lovely-neon-container">
            <span class="lovely-heart">💖</span>
            <span class="lovely-text">Lovely</span>
            <span class="lovely-heart">💖</span>
        </div>
    </div>

    <!-- مشغل الأغاني -->
    <div class="music-player">
        <div class="player-thumb"><img src="Snapchat-514313126.jpg" alt="Thumbnail"></div>
        <div class="player-controls">
            <button class="ctrl-btn" onclick="prevSong()"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button id="play-btn" class="play-pause-btn" onclick="togglePlay()">
                <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor" height="18" width="18"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" height="18" width="18" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="ctrl-btn" onclick="nextSong()"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </div>
        <div class="track-info">
            <div class="track-header">
                <div class="track-title"><span id="track-title">يوم ما اتقابلنا</span><span id="track-emoji" class="custom-emoji">🤍</span></div>
                <div class="track-indicators"><span id="track-index" class="page-num">1 / 2</span></div>
            </div>
            <div class="progress-container">
                <input type="range" id="progress-bar" value="0" min="0" max="100" onchange="seekAudio()">
                <div class="time-row"><span id="current-time">0:00</span><span id="duration">0:00</span></div>
            </div>
        </div>
        <audio id="myAudio" autoplay loop><source id="audio-source" src="song1.mp3" type="audio/mpeg"></audio>
    </div>

    <script>
        // --- 1. تأثير القلوب البني اللي بتنزل ---
        function startBrownHearts() {
            const heartsBg = document.getElementById('hearts-bg');
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerText = '🤎';
                heart.classList.add('brown-heart');
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 4 + 4) + 's'; // سرعة السقوط
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                heartsBg.appendChild(heart);
                setTimeout(() => heart.remove(), 8000);
            }, 350); // معدل نزول القلوب
        }
        startBrownHearts(); // تشغيل القلوب بمجرد فتح الصفحة

        // --- 2. تأثير الآلة الكاتبة للكلام ---
        // تقدر تغير السطور دي وتكتب الكلام اللي انت عايزه هنا:
        const messageLines = [
            " بجد انا بحبك اوي، عارف ان الهديه دي بسيطه و مش من مقامك بس حبيت اعملك فكره جديده تبسطك ❣️، عايزك متزعليش مني على اي مره زعلتك فيها انا زي الطفل العبيط بغلط كتير و عارف انك عديتي كتير بس انا ببقى غصب عني و عشان كده ببقى مستعد اصلح بس مستغناش عنك عشان احنا لما بنتخانق يومي بيبوظ من غيرك، انتي ليا ام و اخت و حبيبة و صديقه و بنوته و زميله و كل حاجه ❤️، عايزين بقى الخطوه اللي جايه اعملك حاجه اكبر من دي تكون مليانه ذكريات و مليانه حب 🫶🏻❤️ مش عايز منك غير وجودك جنبي و حنيتك عليا اللي بتهون عليا كتير بجد و اوعدك هتشوفي فوقيها اضعاف و هعوضك عن كل وحش في حياتك على قد ما اقدر عشان مليش غيرك💗🫶🏻 ربنا يخليكي ليا و ميحرمنيش منك و يجعلك اجمل هديه في حياتي هديه دائمه مش مؤقته و مشوفش فيكي يا مريم يا بنت طنط ايناس حاجه وحشه أبدا ولا زعل ولا تعب و يجي اليوم اللي نقول فيه عدينا من كل الصعب سوا و اجري عليكي زي الطفل بس هكون طفل كبير شويه 😂💗 بحبك ❣️"
        ];

        const typingContainer = document.getElementById('typing-container');
        let currentLine = 0;
        let currentChar = 0;

        function typeWriterEffect() {
            if (currentLine < messageLines.length) {
                // لو بنبدأ سطر جديد، بنعمله ديف جديد
                if (currentChar === 0) {
                    let lineDiv = document.createElement('div');
                    lineDiv.id = 'line-' + currentLine;
                    typingContainer.appendChild(lineDiv);
                }
                
                let targetDiv = document.getElementById('line-' + currentLine);
                
                // لسه بنكتب في نفس السطر
                if (currentChar < messageLines[currentLine].length) {
                    targetDiv.innerHTML = messageLines[currentLine].substring(0, currentChar + 1) + '<span class="cursor"></span>';
                    currentChar++;
                    setTimeout(typeWriterEffect, 80); // سرعة كتابة الحروف
                } else {
                    // خلصنا السطر
                    targetDiv.innerHTML = messageLines[currentLine]; // نشيل المؤشر من السطر ده
                    currentLine++;
                    currentChar = 0;
                    setTimeout(typeWriterEffect, 600); // استراحة قبل السطر اللي بعده
                }
            } else {
                // لما يخلص السطور كلها يضيف المؤشر في الآخر بيفلش
                let finalDiv = document.getElementById('line-' + (currentLine - 1));
                finalDiv.innerHTML += '<span class="cursor"></span>';
            }
        }

        // بدء الكتابة بعد ثانية من فتح الصفحة
        setTimeout(typeWriterEffect, 1000);

        // --- 3. سكربت مشغل الأغاني ---
        const playlist = [{ title: "يوم ما اتقابلنا", emoji: "🤍", src: "song1.mp3" }, { title: "وانت معايا", emoji: "😍", src: "song2.mp3" }];
        let currentTrack = 0;
        const audio = document.getElementById('myAudio');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressBar = document.getElementById('progress-bar');

        // عشان الموسيقى تشتغل على طول (لو المتصفح سمح بكده)
        audio.play().then(() => {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
        }).catch(() => {
            // لو المتصفح منع التشغيل التلقائي
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        });

        function loadTrack(index) {
            audio.src = playlist[index].src;
            document.getElementById('track-title').innerText = playlist[index].title;
            document.getElementById('track-emoji').innerText = playlist[index].emoji;
            document.getElementById('track-index').innerText = (index + 1) + " / " + playlist.length;
            progressBar.value = 0;
            progressBar.style.background = '#e3d5ca';
        }

        function nextSong() { currentTrack = (currentTrack + 1) % playlist.length; loadTrack(currentTrack); audio.play(); playIcon.style.display = 'none'; pauseIcon.style.display = 'block'; }
        function prevSong() { currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; loadTrack(currentTrack); audio.play(); playIcon.style.display = 'none'; pauseIcon.style.display = 'block'; }
        
        function togglePlay() {
            if (audio.paused) { 
                audio.play(); playIcon.style.display = 'none'; pauseIcon.style.display = 'block'; 
            } else { 
                audio.pause(); playIcon.style.display = 'block'; pauseIcon.style.display = 'none'; 
            }
        }

        audio.addEventListener('timeupdate', () => {
            if (!isNaN(audio.duration)) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressBar.value = progressPercent;
                progressBar.style.background = `linear-gradient(to right, #d5bdaf ${progressPercent}%, #e3d5ca ${progressPercent}%)`;
                document.getElementById('current-time').innerText = formatTime(audio.currentTime);
                document.getElementById('duration').innerText = formatTime(audio.duration);
            }
        });

        function seekAudio() { audio.currentTime = audio.duration * (progressBar.value / 100); }
        function formatTime(time) { const m = Math.floor(time / 60); const s = Math.floor(time % 60); return m + ':' + (s < 10 ? '0' : '') + s; }
    </script>
</body>
</html>
